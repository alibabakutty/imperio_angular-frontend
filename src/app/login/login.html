<div class="login-page-wrapper">
  <div class="login-background">
    <div class="login-card">

      <div class="login-image">
        <img src="../../assets/user_login.jpeg" alt="Tally Prime Illustration">
      </div>

      <div class="login-form-container">
        <h2>Welcome Back !!!</h2>
        <h3>{{ isRegisterMode ? 'Create New Account' : 'User Login' }}</h3>

        <div *ngIf="errmessage" class="error-banner">
        {{ errmessage }}
      </div>

      <div *ngIf="successMessage" class="success-banner">
    {{ successMessage }}
  </div>

        <!-- ✅ FORM START -->
        <form #loginForm="ngForm" (ngSubmit)="onSubmit()" novalidate>

          <div class="form-group">
            <label>User Name</label>
            <input
              type="text"
              name="username"
              placeholder="Enter the username"
              autocomplete="off"
              required
              [(ngModel)]="login.username"
              (keydown.enter)="password.focus()"
              #username>
          </div>

          <div class="form-group" *ngIf="isRegisterMode">
          <label>Email ID</label>
          <input type="email" name="email" required [(ngModel)]="login.email">
        </div>

          <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required [(ngModel)]="login.password" #password>
        </div>

          <div class="form-group" *ngIf="isRegisterMode">
          <label>Role</label>
          <select name="role" [(ngModel)]="login.role" class="role-select">
            <option value="admin">Administrator</option>
            <option value="user">User</option>
            <!-- <option value="staff">Staff</option> -->
          </select>
        </div>

          <div class="form-actions">
          <!-- <a href="javascript:void(0)" (click)="toggleMode()">
            {{ isRegisterMode ? 'Already have an account? Login' : 'Wanna Register?' }}
          </a> -->

          <button type="submit" class="btn btn-success" [disabled]="loginForm.invalid || isLoading">
            <span *ngIf="!isLoading">{{ isRegisterMode ? 'Register' : 'Login' }}</span>
            <span *ngIf="isLoading" class="spinner"></span>
          </button>
        </div>

        </form>
        <!-- ✅ FORM END -->

      </div>
    </div>
  </div>
</div>
