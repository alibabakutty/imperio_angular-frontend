<main>
  <nav class="navbar" *ngIf="isheadValid">
    <div class="nav-left">
      IMPERIO SALES ORDER
    </div>

    <div class="nav-center" *ngIf="username">
      <div class="role-badge" [ngClass]="userRole === 'distributor' ? 'distributor-bg' : 'direct-bg'">
        <i class="bi" [ngClass]="userRole === 'distributor' ? 'bi-truck' : 'bi-person-check'"></i>
        {{ userRole === 'distributor' ? 'DISTRIBUTOR PORTAL' : 'DIRECT ORDER PORTAL' }}
      </div>
    </div>

    <div class="nav-right">
      <ng-container *ngIf="username; else loginDropdown" class="user-welcome">
        <div class="user-welcome">
          <span>Welcome, <strong>{{ username }}</strong></span>
          <a (click)="logout()" class="logout-link">Logout</a>
        </div>
      </ng-container>

      <ng-template #loginDropdown>
        <div class="login-dropdown" 
             (mouseenter)="toggleDropdown(true)" 
             (mouseleave)="toggleDropdown(false)">
          
          <button class="dropbtn" 
                  [class.active]="isDropdownOpen"
                  (click)="toggleDropdown(!isDropdownOpen)">
            LOGIN 
            <i class="bi" [ngClass]="isDropdownOpen ? 'bi-caret-up-fill' : 'bi-caret-down-fill'"></i>
          </button>

          <div class="dropdown-content" [class.show]="isDropdownOpen">
            <a (click)="onLogin('direct')" 
               [class.focused]="focusedIndex === 0"
               (mouseenter)="focusedIndex = 0">
              <i class="bi bi-person-fill"></i> Direct Login
            </a>
            <a (click)="onLogin('distributor')" 
               [class.focused]="focusedIndex === 1"
               (mouseenter)="focusedIndex = 1">
              <i class="bi bi-truck"></i> Distributor Login
            </a>
          </div>
        </div>
      </ng-template>
    </div>
  </nav>

  <div class="image-container" *ngIf="IsValid">
    <img [src]="ImagePath" />
  </div>

  <div class="bottom-container" *ngIf="IsValid">
    <h6>Copyright © {{currentYear}} CLOUD 9 SOFT TECHNOLOGIES</h6>

    <div class="platform">
      <div class="social-links">
        <a href="https://cloud9softtechnologies.com" target="_blank" aria-label="Website">
          <i class="bi bi-globe"></i>
        </a>
        <a href="https://www.linkedin.com/company/cloud9softtechnologies" target="_blank" aria-label="LinkedIn">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="https://www.youtube.com/@1976perumal" target="_blank" aria-label="YouTube">
          <i class="bi bi-youtube"></i>
        </a>
        <a href="mailto:tallyperumal@gmail.com" aria-label="Gmail">
          <i class="bi bi-envelope-fill"></i>
        </a>
      </div>
    </div>
  </div>
</main>
<router-outlet />
