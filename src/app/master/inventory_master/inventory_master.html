<div class="page-wrapper">
  <button class="back-btn" (click)="goBack()">Back</button>

  <div class="form-panel">
    <div class="panel-header">Inventory Master</div>

    <form [formGroup]="inventoryForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <label>Item Code :</label>
        <input
          #inputField
          type="text"
          formControlName="stockItemCode"
          (input)="toUpperCase($event)"
          (keydown.enter)="onEnter($any($event), 0)"
        />
      </div>

      <div class="row">
        <label>Item Name :</label>
        <input
          #inputField
          type="text"
          formControlName="stockItemName"
          (input)="capitalizeWords($event)"
          (keydown.enter)="onEnter($any($event), 1)"
        />
      </div>

      <div class="row">
        <label>Description :</label>
        <input
          #inputField
          type="text"
          formControlName="stockItemDescription"
          (input)="capitalizeWords($event)"
          (keydown.enter)="onEnter($any($event), 2)"
        />
      </div>

      <div class="row">
        <label>Category :</label>
        <input
          #inputField
          type="text"
          formControlName="stockItemCategory"
          (input)="capitalizeWords($event)"
          (keydown.enter)="onEnter($any($event), 3)"
        />
      </div>

      <div class="row">
        <label>UOM :</label>
        <input
          #inputField
          type="text"
          formControlName="uom"
          (input)="toUpperCase($event)"
          (keydown.enter)="onEnter($any($event), 4)"
        />
      </div>

      <div class="row">
        <label>Rate Master :</label>
        <input
          #inputField
          type="text"
          formControlName="rateMaster"
          (keydown)="onRateMasterKeydown($event)"
          (keydown.enter)="onEnter($any($event), 5)"
          autocomplete="off"
          placeholder=""
        />
      </div>

      <div class="btn-container">
        <button type="submit">Save</button>
      </div>
    </form>
  </div>

  <!-- 🔥 MODAL -->
  <div class="overlay" *ngIf="showRateMaster">
    <div class="modal-box">
      <div class="modal-header">
        Allocations of Product : {{ inventoryForm.get('stockItemName')?.value }}
      </div>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>MRP</th>
            <th>Rate</th>
            <th>VAT %</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let row of rateMasterRows; let i = index">
            <td>
              <input
                type="text"
                [id]="'date-' + i"
                [(ngModel)]="row.rateMasterDate"
                placeholder="DD-MM-YYYY"
                (blur)="parseDateInput($event, i)"
                (keydown.enter)="onTableEnter($event, i, 'date')"
              />
            </td>

            <td>
              <input
                type="text"
                [id]="'mrp-' + i"
                class="text-right"
                [value]="
                  focusedCell === i + '-mrp' ? row.rateMasterMrp : formatToNaira(row.rateMasterMrp)
                "
                (focus)="handleFocus(i, 'mrp')"
                (blur)="handleBlur(i, 'rateMasterMrp', $event)"
                (keydown.enter)="onTableEnter($event, i, 'mrp')"
              />
            </td>

            <td>
              <input
                type="text"
                [id]="'rate-' + i"
                class="text-right"
                [value]="
                  focusedCell === i + '-rate'
                    ? row.rateMasterRate
                    : formatToNaira(row.rateMasterRate)
                "
                (focus)="handleFocus(i, 'rate')"
                (blur)="handleBlur(i, 'rateMasterRate', $event)"
                (keydown.enter)="onTableEnter($event, i, 'rate')"
              />
            </td>

            <td>
              <input
                type="text"
                [id]="'vat-' + i"
                class="text-right"
                [value]="
                  focusedCell === i + '-vat'
                    ? row.vatPercentage
                    : (row.vatPercentage | number: '1.2-2') + '%'
                "
                (focus)="handleFocus(i, 'vat')"
                (blur)="handleBlur(i, 'vatPercentage', $event)"
                (keydown.enter)="onTableEnter($event, i, 'vat')"
              />
            </td>

            <td>
              <input
                type="text"
                [id]="'status-' + i"
                [(ngModel)]="row.rateMasterStatus"
                (keydown)="onStatusKeydown($event, i)"
                (keydown.enter)="onTableEnter($event, i, 'status')"
                autocomplete="off"
                placeholder="A/I"
                class="form-control"
              />
            </td>
          </tr>
        </tbody>
      </table>

      <div class="modal-actions">
        <!-- <button (click)="addNewRateRow()">+ Add Row</button> -->
        <button (click)="closeRateMaster()">Close</button>
      </div>
    </div>
  </div>
</div>
